apiVersion: v1
kind: Pod
metadata:
  labels:
    run: a3
  name: a3
spec:
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
  - image: nginx
    name: a3

