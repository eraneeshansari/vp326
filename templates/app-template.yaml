apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: app-template
  annotations:
    description: Template for building and deploying a simple application server
    tags: "application,build,deploy"

objects:
- apiVersion: v1
  kind: Service
  metadata:
    name: ${NAME}
    labels:
      app: ${NAME}
    annotations:
      description: Exposes the application server to other services in the cluster
  spec:
    selector:
      app: ${NAME}
    ports:
      - name: web
        port: 80
        targetPort: 80

- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: ${NAME}
    labels:
      app: ${NAME}
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: ${NAME}
    template:
      metadata:
        labels:
          app: ${NAME}
      spec:
        containers:
          - name: con1
            image: ${IMAGE_NAME}:${IMAGE_TAG}
            ports:
              - containerPort: 80
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    name: ${NAME}
    labels:
      app: ${NAME}
  spec:
    port:
      targetPort: web
    to:
      kind: Service
      name: ${NAME}
parameters:
- description: The name assigned to all of the frontend objects defined in this template.
  name: NAME
  required: true
  value: myapp
- description: The amount of memory to allocate to the application server.
  name: IMAGE_NAME
  required: true
  value: nginx
- description: The amount of memory to allocate to the application server.
  name: IMAGE_TAG
  required: true
  value: latest