apiVersion: v1
kind: Pod
metadata:
 name: ngapp
 labels:
   app: ngapp
spec:
 containers:
 - name: con1
   image: nginx:latest
   ports:
   - containerPort: 80
   volumeMounts:
   - name: mycm
     mountPath: /usr/share/nginx/html

 volumes:
 - name: mycm
   configMap:
     name: ngapp 

---
apiVersion: v1
kind: Service
metadata:
  name: ngapp-svc
spec:
  type: ClusterIP
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: ngapp
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  labels:
    app: ngapp
  name: ngapp
spec:
  port:
    targetPort: 80
  to:
    kind: ""
    name: ngapp-svc

