apiVersion: v1
kind: Pod
metadata:
 name: mysql
 labels:
   app: mysql
spec:
 containers:
 - name: con1
   image: mysql:5.7
   env:
   - name: MYSQL_ROOT_PASSWORD
     valueFrom:
       secretKeyRef:
         name: mypass
         key: PASSWD 
   - name: MYSQL_DATABASE
     value: wpdb
   ports:
   - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
spec:
  type: ClusterIP
  ports:
  - port: 3306
    protocol: TCP
    targetPort: 3306
  selector:
    app: mysql

