apiVersion: v1
kind: Pod
metadata:
  name: myapp
  labels:
    app.kubernetes.io/name: myapp
spec:
  containers:
  - name: myapp
    image: nginx:latest
    ports:
      - containerPort: 80
    volumeMounts:
      - name: myvolume
        mountPath: /app
  volumes:
    - name: myvolume
      persistentVolumeClaim:
        claimName: mypvc